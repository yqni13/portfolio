<section class="skills" id="head-skills">
    <h2>Skills & Expertise</h2>
    <span>Technologies and tools I am proficient with and use to build applications.</span>
    <div id="skills-content">
        @for(skillset of skills; track $index) {
            <div class="skills-wrapper">
                <h3>{{skillset.title}}</h3>
                <div class="skills-badge-wrapper">
                    @for(skill of skillset.skills; track $index) {
                        <app-badge
                            [icon]="skill.icon"
                            [name]="skill.name"
                            [link]="skill.link"
                            [hasBlackWhiteBg]="skill.customStyle ?? false"
                        ></app-badge>
                    }
                </div>
            </div>
        }
    </div>
</section>
