<!-- lazy load rendering in browser to avoid stylesheet delay (temp solution) -->
<!-- https://stackoverflow.com/questions/79207839/angular-flickering-issue -->
@defer {
	<app-navbar></app-navbar>
	<main class="main roboto-custom-font">
		<div class="anchor">
			<app-background></app-background>
		</div>
		<app-hero></app-hero>
		<app-work></app-work>
		<app-skills></app-skills>
		<app-about></app-about>
		<app-experience></app-experience>
		<app-contact></app-contact>

		@if(notifyModal.notifications().length > 0) {
			<div class="main-notifymodal">
				@for(notification of notifyModal.notifications(); track $index) {
					<app-notify-modal [notification]="notification"></app-notify-modal>
				}
			</div>
		}
	</main>
	<app-footer></app-footer>
}
<router-outlet />
