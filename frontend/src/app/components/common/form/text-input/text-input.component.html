<div class="textinput" ngClass="{{ngClass()}}">
    <i
        id="custom-icon"
        class="icon-base"
        ngClass="{{'icon-' + icon()}}"
    ></i>
    <input
        type="{{inputType()}}"
        id="{{'custom-form-' + fieldName()}}"
        placeholder="{{placeholder()}}"
        [formControl]="formControl()"
        name="{{name()}}"
        [ngStyle]="customStyle()"
    >
    @if(formControl().invalid && (formControl().dirty || formControl().touched)) {
        <i
            id="error-icon"
            class="icon-base icon-Warning"
            ngClass="warning-input-text"
        ></i>
    }
</div>
<app-validation-input
    [ngControl]="formControl()"
    [fieldName]="fieldName()"
></app-validation-input>
