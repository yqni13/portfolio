@if(data) {
    <div class="workcard-detail">
        <div class="workcard-detail-content">
            <span id="workcard-detail-type">{{data.type}}</span>
            <h4>{{data.name}}</h4>
            <span id="workcard-detail-intro">{{data.intro}}</span>
            <p>{{data.description}}</p>
            <span id="workcard-detail-impact">Impact</span>
            <ul>
                @for(listing of data.impact; track $index) {
                    <li>
                        <span>{{listing}}</span>
                    </li>
                }
            </ul>
            <div id="workcard-detail-techstack">
                @for(item of data.techstack; track $index) {
                    <span class="workcard-detail-techstack">{{item}}</span>
                }
            </div>
            <div id="workcard-detail-links">
                @if(data.links.demo) {
                    <a href="{{data.links.demo}}">
                        <span>Demo</span>
                        <i class="icon-base icon-GoTo"></i>
                    </a>
                }
                @if(data.links.live) {
                    <a href="{{data.links.live}}">
                        <span>Live</span>
                        <i class="icon-base icon-GoTo"></i>
                    </a>
                }
                <a href="{{data.links.repo}}">
                    <span>Repository</span>
                    <i class="icon-base icon-GitHub"></i>
                </a>
            </div>
        </div>
        <a class="workcard-detail-close" (click)="closeDetails()">
            <i class="icon-base icon-Close"></i>
        </a>
    </div>
}
